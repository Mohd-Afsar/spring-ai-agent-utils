spring.application.name=nova-agent-demo

## ============================================================
## PRIMARY MODEL: Groq (OpenAI-compatible, ultra-fast inference)
## Export: GROQ_API_KEY=gsk_...
## ============================================================
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=openai/gpt-oss-120b
spring.ai.openai.chat.options.strict-schema=false
spring.ai.openai.chat.options.max-tokens=32768

## Model info shown in the system prompt
agent.model=openai/gpt-oss-120b
agent.model.knowledge.cutoff=2024-12-01

## ============================================================
## DATABASE — MySQL (railtel)
## ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/railtel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

## ============================================================
## PM DATA RETRIEVAL MODULE — Cassandra
## ============================================================
spring.cassandra.contact-points=localhost
spring.cassandra.port=9043
spring.cassandra.keyspace-name=topology
spring.cassandra.local-datacenter=dc1
spring.cassandra.username=${CASSANDRA_USERNAME:cassandra}
spring.cassandra.password=${CASSANDRA_PASSWORD:cassandra}
spring.cassandra.schema-action=NONE

## PM API server port (separate from NOVA CLI — web runs in background)
server.port=8080

## PM API base URL used by PmDataFetchTool (NOVA calls this internally)
pm.api.base-url=http://localhost:8080

## PM query limits
pm.query.max-result-size=10000
pm.query.default-page-size=500

## ============================================================
## LOGGING — suppress noisy Cassandra driver topology warnings
## The driver discovers other cluster nodes (on port 9042) that
## are not reachable from this machine; suppress the retry noise.
## ============================================================
logging.level.com.datastax.oss.driver.internal.core.pool.ChannelPool=ERROR
logging.level.com.datastax.oss.driver.internal.core.ContactPoints=ERROR
logging.level.com.datastax.oss.driver.internal.core.loadbalancing=ERROR
## Suppress Spring AI's own verbose retry WARN logs — our callWithRetry handles user messaging
logging.level.org.springframework.ai.retry=ERROR

## ============================================================
## JANUSGRAPH — Network Topology RCA
## Set janusgraph.enabled=true and configure host/port when
## JanusGraph Gremlin Server is port-forwarded to localhost.
## Example: ssh -L 8182:janusgraph-server:8182 user@jump-host
## ============================================================
janusgraph.enabled=true
janusgraph.gremlin.host=localhost
janusgraph.gremlin.port=8182
janusgraph.gremlin.traversal-source=g
## graphson (default) = works with JanusGraph without janusgraph-* jars on the client.
## graphbinary = can fail with "RelationIdentifier not found" unless you add JanusGraph IoRegistry to the client.
janusgraph.gremlin.serializer=graphson
janusgraph.gremlin.connection-pool-size=4
janusgraph.gremlin.connection-setup-timeout-ms=8000

## ---- NetworkTopologyRca tool (inventory markdown + optional NetworkIntelligence) ----
## max-alarming-nodes: cap distinct NE names per call (open-alarm floods).
## max-topology-chars-for-network-intelligence: skip NI if report is larger (saves LLM context). Use 0 = no limit.
## Lower children/neighbors if reports are still too large.
nova.topology.max-alarming-nodes=120
nova.topology.max-topology-chars-for-network-intelligence=100000
nova.topology.max-children-per-node=30
nova.topology.max-link-neighbors-per-node=25

## Run JanusGraph Gremlin connectivity health check at app startup.
## Set to true only when you want startup validation noise.
janusgraph.startup-healthcheck.enabled=false

## ---- JanusGraph inventory sync (MySQL railtel → Gremlin) -----------------
## NOVA's GraphTopologyService expects vertices with property nodeId = NETWORK_ELEMENT.NE_NAME,
## PARENT_OF (parent equipment → child), and optional CONNECTED_TO from OSPF_LINK.
janusgraph.inventory-sync.enabled=true
## Manual-only mode: do NOT auto-sync on app startup.
janusgraph.inventory-sync.run-on-startup=false
janusgraph.inventory-sync.skip-if-nonempty=true
## Fraction of NETWORK_ELEMENT rows that must exist as g.V().has("nodeId") before startup sync is skipped.
janusgraph.inventory-sync.min-completion-ratio=0.95
## INFO log every N vertices/rows during sync so you see heartbeat (Phase 1 is ~57k Gremlin calls).
janusgraph.inventory-sync.log-progress-every=3000
janusgraph.inventory-sync.force=false
## Destroys all vertices first — only when you need a clean rebuild.
janusgraph.inventory-sync.drop-graph-before-sync=false
janusgraph.inventory-sync.load-ospf-links=true

