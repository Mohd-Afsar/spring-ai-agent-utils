# =============================================================================
# NOVA — JanusGraph / Gremlin client settings
# =============================================================================
# Single place for Gremlin connection + client-side Janus toggles.
# Loaded via spring.config.import=optional:classpath:janusgraph-client.properties in application.properties
# (that import must stay so these keys are available before conditional beans are evaluated).
# Override with a file URL if needed, e.g.:
#   spring.config.import=optional:file:${user.home}/.nova/janusgraph-client.properties
#
# Env vars still override (e.g. JANUSGRAPH_GREMLIN_HOST).
#
# This file mirrors the JanusGraph *server* storage profile for operators (same
# values as janusgraph.properties / janusgraph-cql.properties on the Janus host).
# NOVA still connects only via Gremlin; it does not open Cassandra sessions.
# Use this block for alignment checks, logs at startup, and env overrides
# (e.g. JANUSGRAPH_STORAGE_HOSTNAME).
# =============================================================================

## Enable remote Gremlin / graph beans (GraphTraversalSource, Cluster).
janusgraph.enabled=true

## Run optional connectivity probe at Spring startup.
janusgraph.startup-healthcheck.enabled=false
janusgraph.mode=embedded
janusgraph.embedded.config-path=/Users/ent-0197/Downloads/janusgraph-full-1.0.0/conf/janusgraph-cql.properties
## After startup: log Gremlin reachability + graph counts (can be slow on huge graphs).
janusgraph.startup-diagnostics.enabled=true

## Gremlin Server (same target as gremlin.sh :remote connect tinkerpop.server …)
janusgraph.gremlin.host=localhost
janusgraph.gremlin.port=8182
janusgraph.gremlin.traversal-source=g

## graphson = default; works without janusgraph-* jars on the client.
## graphbinary = needs JanusGraph IoRegistry on the client serializer.
janusgraph.gremlin.serializer=graphson

janusgraph.gremlin.connection-pool-size=4
janusgraph.gremlin.min-connection-pool-size=1
janusgraph.gremlin.connection-setup-timeout-ms=8000

## Storage backend JanusGraph Server uses (must match the running graph).
## Typical: cql (Cassandra). Logged when the Gremlin client connects.
janusgraph.storage.backend=cql
janusgraph.storage.datacenter=dc1
## Cassandra contact(s) for Janus storage on the server (not NOVA's Gremlin host).
## Single host here; use a comma-separated list only for documentation if your
## cluster has several seeds (operators paste the same line as on the server).
janusgraph.storage.hostname=127.0.0.1
## CQL port on the server (default Cassandra 9042 in production; match your stack). 0 = omit from logs.
janusgraph.storage.port=9043

janusgraph.storage.cql.keyspace=topology
janusgraph.storage.cql.read-consistency-level=LOCAL_QUORUM
janusgraph.storage.cql.write-consistency-level=LOCAL_QUORUM
## Optional; leave empty if not used.
# janusgraph.storage.cql.local-datacenter=
