spring.application.name=claude-like-agent-demo
spring.main.web-application-type=none

## ============================================================
## PRIMARY MODEL: Groq (OpenAI-compatible client in spring-ai-starter-model-openai)
## Export: GROQ_API_KEY=gsk_...
## Model id must match Groq's list (see https://console.groq.com/docs/models )
## ============================================================
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.chat.options.model=claude-sonnet-4.6
# Disable strict JSON schema validation — Groq rejects mismatched schemas otherwise
spring.ai.openai.chat.options.strict-schema=false

## Retry configuration — allow Spring AI to retry on transient errors
## Note: 429 rate-limit is handled in Application.java with backoff + wait-time parsing
spring.ai.retry.max-attempts=1
spring.ai.retry.on-client-errors=false

## Model info shown in the system prompt (cosmetic; should match what you configured above)
agent.model=claude-sonnet-4.6
agent.model.knowledge.cutoff=2024-12-01

## ============================================================
## OPTIONAL: Switch to Anthropic Claude
## Export: ANTHROPIC_API_KEY=sk-ant-...
## Also swap the pom.xml dependency to spring-ai-starter-model-anthropic
## ============================================================
# spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
# spring.ai.anthropic.chat.options.model=claude-sonnet-4-6
# agent.model=claude-sonnet-4-6
# agent.model.knowledge.cutoff=2025-08-01

## ============================================================
## OPTIONAL: Switch to OpenAI
## Export: OPENAI_API_KEY=sk-...
## ============================================================
# spring.ai.openai.base-url=https://api.openai.com
# spring.ai.openai.api-key=${OPENAI_API_KEY}
# spring.ai.openai.chat.options.model=gpt-4o
# agent.model=gpt-4o
# agent.model.knowledge.cutoff=2024-06-01

## ============================================================
## MCP Client (optional — remove/comment out if not using MCP)
## ============================================================
spring.ai.mcp.client.stdio.servers-configuration=classpath:/mcp-servers-config.json

## ============================================================
## AGENT CONFIGURATION
## ============================================================
agent.skills.paths=classpath:/.claude/skills

## ============================================================
## DATABASE AGENT — MySQL (railtel)
## ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/railtel?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

## Web search: set BRAVE_API_KEY env var to enable BraveWebSearchTool
